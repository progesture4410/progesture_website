<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - ProGesture</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;

  display: flex;
  justify-content: center;
  align-items: center;

  height: 100vh;
  overflow: hidden;
  padding: 20px;

  background-color: #e9e9e9;
}

.cyber-pattern{
  position:fixed;
  inset:0;
  z-index:-1;

  background-color:#e9e9e9;

  background-image:
    radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.12) 100%),
    linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px),
    linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);

  background-size:
    100% 100%,
    60px 60px,
    60px 60px,
    20px 20px,
    20px 20px;

  animation:cyber-move 12s linear infinite;
}

@keyframes cyber-move{
  100%{
    background-position:
      0 0,
      60px 60px,
      60px 60px,
      40px 40px,
      40px 40px;
  }
}

/* container */
.form-container {
  position: relative;
  z-index: 1;
  width: 100%;
  display: flex;
  justify-content: center;
}

/* card */
.form {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 14px;

  max-width: 420px;
  width: 100%;
  padding: 20px 30px 25px 30px;

  border-radius: 24px;
  background: #ffffff;

  border: 1px solid rgba(128,0,0,0.12);
  box-shadow:
    0 30px 60px rgba(0,0,0,0.12),
    0 10px 25px rgba(0,0,0,0.08);
}
/* header */
.center-header {
  text-align: center;
  margin-bottom: 10px;
}

.center-header img {
  width: 85px;
  border-radius: 50%;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.center-header .title {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-top: 18px;
  margin-bottom: 6px;
  color: #800000;
}

.center-header .message {
  font-size: 14px;
  color: #4b5563;
  margin-top: 0;
}

.title {
  font-size: 28px;
  font-weight: 700;
  color: #800000;
  margin-top: 10px;
}

.message {
  font-size: 14px;
  color: #4b5563;
}

/* ===== Floating Input (Signup Style) ===== */
.form label {
  position: relative;
  width: 100%;
}

.input {
  width: 100%;
  box-sizing: border-box;
  padding: 20px 14px 10px 14px;
  font-size: 16px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  background: #ffffff;
  outline: none;
  transition: 0.25s ease;
}

.input:focus {
  border-color: #800000;
}

.form label .input:focus {
  border-color: #800000;
}

.form label .input + span {
  color: #6b7280;
  position: absolute;
  left: 10px;
  top: 12px;
  font-size: 13px;
  transition: 0.3s ease;
}

.form label .input:focus + span,
.form label .input:valid + span {
  color: #800000;
  top: 4px;
  font-size: 0.7em;
  font-weight: 600;
}

/* button */
.submit {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;

  background: linear-gradient(135deg, #800000, #a00000);
  color: white;
  font-weight: 600;

  cursor: pointer;
  transition: 0.25s;
}

.submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(128,0,0,0.3);
}

/* back button */
.back-signin {
  margin-top: 1px;
  display: block;
  text-align: center;   /* 👈 center text */
  width: 100%;          /* 👈 ensure full width */
  text-decoration: none;
  color: #800000;
  font-size: 13px;
  font-weight: 600;
}

/* success text */
.success {
  color: #16a34a;
  font-size: 13px;
  text-align: center;
}

/* ===== Modal ===== */
.pg-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  backdrop-filter: blur(6px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.pg-modal-box {
  width: 420px;
  max-width: 90%;
  background: #ffffff;
  border-radius: 18px;
  padding: 30px;
  position: relative;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

.pg-close {
  position: absolute;
  right: 18px;
  top: 14px;
  font-size: 20px;
  cursor: pointer;
}

.pg-content {
  display: flex;
  align-items: center;
  gap: 16px;
}

.pg-icon-circle {
  width: 50px;
  height: 50px;
  background: #800000;
  color: #ffffff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.pg-text h3 {
  margin: 0;
}

.pg-text p {
  margin-top: 5px;
  font-size: 14px;
}

.pg-btn {
  margin-top: 20px;
  padding: 8px 20px;
  border: none;
  background: #800000;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.pg-btn:hover {
  background: #a00000;
}

  .top-header {
  position: absolute;
  top: -130px;
  width: 100%;
  text-align: center;
}

.top-title {
  font-size: 36px;
  font-weight: 600;
  color: #800000;
  margin: 0;
}

.top-message {
  font-size: 14px;
  color: #4b5563;
  margin-top: 6px;
}

  .input-group {
  position: relative;
  display: block;
}

.input-group i {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #800000;
  font-size: 14px;
  pointer-events: none;
}

/* ===== TOP BAR ===== */
.topbar{
  position:fixed;
  inset:0 0 auto 0;
  height:56px;

  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;

  z-index:1200;
  pointer-events:none;
}

.topbar .btn{
  pointer-events:auto;
  display:inline-flex;
  align-items:center;
  gap:6px;

  height:32px;
  padding:0 14px;

  font-size:12px;
  font-weight:600;

  border-radius:10px;
  text-decoration:none;

  transition:.2s ease;
}

/* maroon button */
.btn-back{
  color:#fff;
  background:linear-gradient(135deg, #800000, #a00000);
  box-shadow:0 4px 12px rgba(128,0,0,0.25);
}

.btn-back:hover{
  transform:translateY(-1px);
}

/* give space for icon */
.input-group .input {
  padding-right: 38px;
}

.brand-header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:10px;
}

.brand-logo{
  width:60px;
  height:60px;
  object-fit:cover;
}

.brand-text{
  font-size:36px;
  font-weight:700;
  color:#800000;
  letter-spacing:1px;
}

.form-title{
  font-size:18px;
  font-weight:700;
  color:#800000;
  margin-bottom:6px;
  margin-left:5px;
}
</style>
</head>

<body>

<div class="topbar">
  <a href="/" class="btn btn-back">
    <i class="fa-solid fa-arrow-left"></i>
    Back to Home
  </a>
</div>

<div class="cyber-pattern"></div>
  <div class="form-container">

    <div class="top-header">

      <div class="brand-header">
        <img src="/static/images/pup_logo.png" class="brand-logo">
        <span class="brand-text">PROGESTURE</span>
      </div>

      <p class="top-message">
        Reset your password to continue to ProGesture.
      </p>

    </div>

    <form class="form" method="POST" action="{{ url_for('forgot_password') }}">

      <p class="form-title">Forgot your Password</p>

      <label class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input class="input"
               type="email"
               name="email"
               pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$"
               title="Please enter a valid Gmail address"
               required>
        <span>Gmail</span>
      </label>

      <!-- MESSAGES -->
      {% if error %}
      <div id="pgModal" class="pg-modal">
        <div class="pg-modal-box">

          <div class="pg-close" onclick="closePgModal()">×</div>

          <div class="pg-content">
            <div class="pg-icon-circle">!</div>

            <div class="pg-text">
              <h3>Error</h3>
              <p>{{ error }}</p>
            </div>
          </div>

          <button type="button" class="pg-btn" onclick="closePgModal()">OK</button>

        </div>
      </div>
      {% endif %}

      {% if success %}
        <p class="success">✔ {{ success }}</p>
      {% endif %}

      <button class="submit" type="submit">Reset Password</button>

      <a href="{{ url_for('login') }}" class="back-signin">← Back to Login</a>

    </form>

  </div>

<script>
function closePgModal() {
  const modal = document.getElementById("pgModal");
  if (modal) {
    modal.style.display = "none";
  }
}
</script>

</body>
</html>
