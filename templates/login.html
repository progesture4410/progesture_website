<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In - ProGesture</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;
      overflow: hidden;
      padding: 20px; /* prevents edge touching on small screens */

      background-color: #e9e9e9;
    }

    /* ===== TOP BAR (same as FAQ) ===== */
    .topbar{
      position:fixed;
      inset:0 0 auto 0;
      height:56px;

      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;

      z-index:1200;
      pointer-events:none;
    }

    .topbar .btn{
      pointer-events:auto;
      display:inline-flex;
      align-items:center;
      gap:6px;

      height:32px;
      padding:0 14px;

      font-size:12px;
      font-weight:600;

      border-radius:10px;
      text-decoration:none;

      transition:.2s ease;
    }

    /* glassy maroon button */
    .btn-back{
      color:#fff;
      background:linear-gradient(135deg, #800000, #a00000);
      box-shadow:0 4px 12px rgba(128,0,0,0.25);
    }

    .btn-back:hover{
      transform:translateY(-1px);
    }

    .form-container {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      justify-content: center;

      margin-top: 70px; /* 👈 pushes everything downward */
    }

    .cyber-pattern{
      position:fixed;
      inset:0;
      z-index:-1;

      background-color:#e9e9e9;

      background-image:
        radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.12) 100%),
        linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px),
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);

      background-size:
        100% 100%,
        60px 60px,
        60px 60px,
        20px 20px,
        20px 20px;

      animation:cyber-move 12s linear infinite;
    }

    @keyframes cyber-move{
      100%{
        background-position:
          0 0,
          60px 60px,
          60px 60px,
          40px 40px,
          40px 40px;
      }
    }

    .form {
      position: relative;
      display: grid;
      grid-template-columns: 1.2fr 1.2fr;
      gap: 2px;
      align-items: center;
      max-width: 700px;
      width: 100%;
      padding:30px 40px;
      border-radius: 28px;
      color: #111111;
      background: #ffffff;

      border: 1px solid rgba(128,0,0,0.12);
      box-shadow:
        0 30px 60px rgba(0,0,0,0.12),
        0 10px 25px rgba(0,0,0,0.08);
    }

    .left-side {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;  /* important */
      align-items: center;          /* centers text under logo */
      text-align: center;
    }

    .logo-container {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .logo-container img {
      width: 95px;
      border-radius: 50%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .logo-container img {
      width: 85px;
      border-radius: 50%;
    }

    .center-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .center-header .title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.8px;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
      margin: 0;
      padding-left: 0;
      color: #800000;
    }

    .center-header .title::before,
    .center-header .title::after {
      display: none;
    }

    .center-header .message {
      font-size: 14px;
      color: #4b5563;
      margin-top: 6px;
    }

    .title {
      position: relative;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      padding-left: 34px;
      margin-top: 20px;   /* smaller spacing below logo */
      margin-bottom: 4px;
      color: #800000;
    }

    .title::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #800000;
      z-index: 2;
    }

    .title::after {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #800000;
      opacity: 0.6;
      animation: pulseDot 1.5s ease-out infinite;
    }

    @keyframes pulseDot {
      0% { transform: translateY(-50%) scale(1); opacity: 0.6; }
      70% { transform: translateY(-50%) scale(2.5); opacity: 0; }
      100% { transform: translateY(-50%) scale(1); opacity: 0; }
    }

    .message {
      font-size: 14px;
      color: #4b5563;
      margin-top: 4px;
      margin-bottom: 20px;
    }

    .right-side {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form label {
      position: relative;
    }

    .input {
      width: 90%;
      box-sizing: border-box;
      padding: 20px 14px 10px 14px;
      font-size: 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      outline: none;
      transition: 0.25s ease;
    }

    .input:focus {
      border-color: #800000;
    }

    .input + span {
      color: #6b7280;
      position: absolute;
      left: 10px;
      top: 12px;
      font-size: 13px;
      transition: 0.3s ease;
    }

    .input:focus + span,
    .input:valid + span {
      color: #800000;
      top: 4px;
      font-size: 0.7em;
      font-weight: 600;
    }

    .password-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: -6px;
      margin-bottom: 1px;
    }

    .show-password {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #444;
      margin: 0;
    }

    .forgot-password {
      text-align: right;
      margin-top: 4px;
      margin-bottom: 6px;
      margin-right: 40px;
    }

    .forgot-password a {
      font-size: 13px;
      color: #800000;
      font-weight: 600;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .forgot-password a:hover {
      text-decoration: none;
      color: #a00000;
    }

    .submit {
      background: #800000;
      border-radius: 6px;
      width: 90%;
      padding: 11px 0;

      display: flex;
      align-items: center;
      justify-content: center;

      box-shadow: 3px 3px 3px rgba(0,0,0,.25);
      cursor: pointer;

      border: none;

      color: #ffffff;
      font-size: 16px;
      font-weight: 500;

      transition: 0.2s ease;
    }

    .signin {
      text-align: center;
      font-size: 13px;
    }

    .signin a {
      color: #800000;
      font-weight: 600;
      text-decoration: none;
    }

    .signin a:hover {
      text-decoration: none;
    }

    #qr-reader {
      width: 100%;
      max-width: 280px;
      aspect-ratio: 1 / 1;

      padding: 0;               /* remove padding */
      border-radius: 16px;
      border: 2px solid #800000;
      overflow: hidden;         /* hides white edges */
      background: transparent;  /* remove white bg */
    }

    /* QR container */
    /* ===== ENHANCED QR CARD (matches design) ===== */
    .qr-wrapper {
      width: 100%;
      max-width: 300px;

      background: #f8f8f8;
      border-radius: 24px;

      padding: 8px;

      box-shadow:
        0 20px 40px rgba(0,0,0,0.15),
        inset 0 2px 6px rgba(255,255,255,0.6);

      display: flex;
      flex-direction: column;
      align-items: center;

      gap: 6px; /* reduce vertical spacing between scanner & text */
    }

    /* scanner frame (black area like design) */
    #qr-reader {
      width: 100%;
      aspect-ratio: 1 / 1;

      border-radius: 16px;
      overflow: hidden;

      background: #111; /* dark background like image */
      position: relative;
    }

    /* fake scan corners (visual only) */
    #qr-reader::before,
    #qr-reader::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 10px;
      pointer-events: none;
    }

    /* bottom description panel */
    .qr-description {
      background: #ffffff;
      margin-top: 10px;

      width: 100%;
      border-radius: 14px;

      padding: 14px;

      font-size: 14px;
      color: #444;
      text-align: center;

      display: flex;
      align-items: center;
      justify-content: cent
    }

    /* optional phone icon */
    .qr-description {
      display: flex;
      align-items: flex-start; /* KEY FIX */
      justify-content: flex-start;
      text-align: left;
      line-height: 1.3; /* tighter text block */
    }

    .qr-description {
      display: flex;
      align-items: center; /* aligns like your reference */
      justify-content: flex-start;

      padding: 6px 6px;
      font-size: 14px;
      color: #555;
      text-align: left;
    }

    .qr-phone {
      width: 80px;   /* visually matches your sample */
      height: auto;
      flex-shrink: 0;
      display: block;
    }

    .qr-text {
      margin: 0;
      line-height: 1.25;
      text-align: justify;
    }

    /* Scanner keeps top rounded */
    #qr-reader {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 20px 20px 0 0;
      overflow: hidden;
      border: none;
    }

    /* Bottom description panel */
    .qr-description {
      background: #fffff;
      box-shadow: inset 0 1px 0 rgba(0,0,0,0.05);
      padding: 1px 10px 1px 10px;
      font-size: 14px;
      color: #555;
      text-align: center;
      border-radius: 0 0 20px 20px;
      width: 95%;
    }

    #qr-reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      transform: scaleX(-1);
    }

    @media (max-width: 768px) {
      .form {
        grid-template-columns: 1fr;
        padding: 160px 25px 30px 25px;
      }
    }

    .top-header {
      position: absolute;
      top: -120px; /* controls distance above card */
      width: 100%;
      text-align: center;
    }

    .top-title {
      font-size: 36px;
      font-weight: 600;
      color: #800000;
      margin: 0;
    }

    .top-message {
      font-size: 14px;
      color: #4b5563;
      margin-top: 0px;
    }

    .input-group {
      position: relative;
      display: block;
    }

    .input-group i {
      position: absolute;
      right: 60px;
      top: 50%;
      transform: translateY(-50%);
      color: #800000;
      font-size: 14px;
      pointer-events: none;
    }

    /* adjust input padding to give space for icon */
    .input-group .input {
      padding-right: 38px
    }

    .show-password input[type="checkbox"] {
      accent-color: #800000;
      cursor: pointer;
    }

    .brand-header{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-bottom:10px;
    }

    .brand-logo{
      width:60px;
      height:60px;
      object-fit:cover;
    }

    .brand-text{
      font-size:36px;
      font-weight:700;
      color:#800000;
      letter-spacing:1px;
    }

    .form-title{
      font-size:18px;
      font-weight:700;
      color:#800000;
      margin-bottom:10px;
      margin-left:5px; /* aligns with inputs */
      }
  </style>
</head>
<body>

<!-- 🔙 TOP BACK BUTTON -->
<div class="topbar">
  <a href="/" class="btn btn-back">
    <i class="fa-solid fa-arrow-left"></i>
    Back to Home
  </a>
</div>

<div class="cyber-pattern"></div>

<div class="form-container">

  <div class="top-header">

    <div class="brand-header">
      <img src="/static/images/pup_logo.png" class="brand-logo">
      <span class="brand-text">PROGESTURE</span>
    </div>

    <p class="top-message">
      Sign in to continue to ProGesture.
    </p>

  </div>

  <form class="form" method="POST" action="{{ url_for('login') }}">

<div class="left-side">

  <div class="qr-wrapper">

    <div id="qr-reader"></div>

    <div class="qr-description">
      <img src="/static/images/phone-icon.png" class="qr-phone">
      <div class="qr-text">
        Use the QR Code sent to your Gmail when you signed up to quickly autofill your username and password.
      </div>
    </div>

  </div>

</div>

<div class="right-side">

  <p class="form-title">Log in to your Account</p>

  <label class="input-group">
    <i class="fa-solid fa-at"></i>
    <input class="input" type="text" name="username" required>
    <span>Username</span>
  </label>

  <label class="input-group">
    <i class="fa-solid fa-lock"></i>
    <input class="input" type="password" id="password" name="password" required>
    <span>Password</span>
  </label>

  <div class="password-row">
    <div class="show-password">
      <input type="checkbox" id="togglePassword">
      <label for="togglePassword">Show Password</label>
    </div>

    <div class="forgot-password">
      <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
    </div>
  </div>

  <button class="submit" id="submitBtn" type="submit">Sign In</button>

  <p class="signin">
    Don’t have an account?
    <a href="{{ url_for('signup') }}">Sign Up</a>
  </p>

</div>

</form>
</div>

<script>
const toggle = document.getElementById("togglePassword");
const password = document.getElementById("password");

toggle.addEventListener("change", function () {
  password.type = this.checked ? "text" : "password";
});

document.querySelector(".form").addEventListener("submit", function () {
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "Signing In...";
});
</script>

<script>
function onScanSuccess(decodedText, decodedResult) {

  if (decodedText.startsWith("LOGIN:")) {

    const data = decodedText.replace("LOGIN:", "").split(":");

    const username = data[0];
    const password = data[1];

    document.querySelector("input[name='username']").value = username;
    document.querySelector("input[name='password']").value = password;

    // stop scanner to avoid multiple scans
    html5QrCode.stop();

    // auto submit form
    document.querySelector(".form").submit();
  }
}

function onScanFailure(error) {
  // silent fail
}

const html5QrCode = new Html5Qrcode("qr-reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices && devices.length) {
    html5QrCode.start(
      devices[0].id,
      {
        fps: 10,
      },
      onScanSuccess,
      onScanFailure
    );
  }
}).catch(err => {
  console.error("Camera error:", err);
});
</script>

</body>
</html>
