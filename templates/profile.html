<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile - ProGesture</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>


<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background-color: #e9e9e9;
  overflow: hidden;
  padding: 20px;
}

.cyber-pattern{
  position:fixed;
  inset:0;
  z-index:-1;

  background-color:#e9e9e9;

  background-image:
    radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.12) 100%),
    linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px),
    linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);

  background-size:
    100% 100%,
    60px 60px,
    60px 60px,
    20px 20px,
    20px 20px;

  animation:cyber-move 12s linear infinite;
}

@keyframes cyber-move{
  100%{
    background-position:
      0 0,
      60px 60px,
      60px 60px,
      40px 40px,
      40px 40px;
  }
}

.form-container {
  position: relative;
  z-index: 1;
  width: 100%;
  display: flex;
  justify-content: center;
}

.form {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 14px;

  max-width: 420px;
  width: 100%;
  padding: 30px 40px;

  border-radius: 28px;
  background: #ffffff;

  border: 1px solid rgba(128,0,0,0.12);
  box-shadow:
    0 30px 60px rgba(0,0,0,0.12),
    0 10px 25px rgba(0,0,0,0.08);

  align-items: center;
}

.title {
  margin: 0;
}

.message {
  margin: 0;
}

/* profile pic */
.profile-pic {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 6px;   /* 🔥 reduced gap */
  border: 3px solid #800000;
}

/* inputs */
.form label {
  position: relative;
  width: 100%;
}

.form label .input {
  width: 100%;
  box-sizing: border-box;
  padding: 20px 14px 10px 14px;
  font-size: 16px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  background: #ffffff;
  color: #111111;
  outline: none;
  transition: 0.25s ease;
}

.form label .input:focus {
  border-color: #800000;
  box-shadow: 0 0 0 3px rgba(128,0,0,0.15);
}

.form label .input + span {
  color: #6b7280;
  position: absolute;
  left: 10px;
  top: 12px;
  font-size: 13px;
  transition: 0.3s ease;
}

.form label .input:focus + span,
.form label .input:valid + span {
  color: #800000;
  top: 4px;
  font-size: 0.7em;
  font-weight: 600;
}

.submit {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;

  background: linear-gradient(135deg, #800000, #a00000);
  color: white;
  font-weight: 600;

  cursor: pointer;
  transition: 0.25s;
}

.submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(128,0,0,0.3);
}


/* DARK SIDE OVERLAY EFFECT */
.cropper-view-box {
  outline: 2px solid #800000;
}

.cropper-dashed {
  display: none;
}

/* Dark outside area */
.cropper-modal {
  background: rgba(0, 0, 0, 0.6);
}

/* MAKE CROP AREA CIRCLE */
.cropper-view-box,
.cropper-face {
  border-radius: 50%;
}

.back {
  margin-top: 1px;
  display: block;
  text-align: center;
  width: 100%;
  text-decoration: none;
  color: #800000;
  font-size: 13px;
  font-weight: 600;
}

.input-group {
  position: relative;
  display: block;
}

.input-group i {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #800000;
  font-size: 14px;
  pointer-events: none;
}

.input-group .input {
  padding-right: 38px;
}

.top-header {
  position: absolute;
  top: -90px;
  width: 100%;
  text-align: center;
}
.top-title {
  font-size: 36px;
  font-weight: 600;
  color: #800000;
  margin: 0;
}

.top-message {
  font-size: 14px;
  color: #4b5563;
  margin-top: 6px;
}

/* ACTION BUTTON CONTAINER */
.crop-actions {
  margin-top: 15px;
  width: 100%;
  display: flex;
  justify-content: flex-end; /* align right */
  gap: 12px;
}

/* BASE BUTTON */
.crop-actions button {
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: 0.25s ease;
}

/* CANCEL BUTTON */
.btn-cancel {
  background: #f3f4f6;
  color: #374151;
}

.btn-cancel:hover {
  background: #e5e7eb;
}

/* SAVE BUTTON */
.btn-save {
  background: linear-gradient(135deg, #800000, #a00000);
  color: #fff;
  box-shadow: 0 6px 15px rgba(128,0,0,0.3);
}

.btn-save:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 20px rgba(128,0,0,0.4);
}

  /* PREVIEW FRAME */
.crop-preview {
  width: 100%;
  max-height: 60vh;

  display: flex;
  justify-content: center;
  align-items: center;

  padding: 0 20px; /* 🔥 creates left & right spacing */
  box-sizing: border-box;
}

/* IMAGE */
.crop-preview img {
  max-width: 100%;
  max-height: 60vh;
  object-fit: contain;
  display: block;
}

</style>
</head>

<body>

<div class="cyber-pattern"></div>

<div class="form-container">

  <div class="top-header">
    <p class="top-title">Account Profile</p>
    <p class="top-message">Edit your account details</p>
  </div>

<form class="form" method="POST" enctype="multipart/form-data">


  <!-- PROFILE IMAGE -->
<img
  id="profilePreview"
  class="profile-pic"
  src="{{ url_for('static', filename=profile.profile_pic) }}?t={{ profile.get('updated_at', '') }}"
  style="cursor:pointer;"
>

<input type="file" id="fileInput" accept="image/*" style="display:none;">

<p style="font-size:12px;color:#800000; margin:0; cursor:pointer;" onclick="document.getElementById('fileInput').click()">
  Click to change profile picture
</p>

  <!-- USERNAME -->
  <label class="input-group">
    <i class="fa-solid fa-user"></i>
    <input class="input" type="text" name="username" value="{{ profile.username }}" required>
    <span>Username</span>
  </label>

  <!-- PASSWORD -->
  <label class="input-group">
    <i class="fa-solid fa-lock"></i>
    <input class="input" type="text" name="password" value="{{ profile.password }}" required>
    <span>Password</span>
  </label>

  <!-- EMAIL -->
  <label class="input-group">
    <i class="fa-solid fa-envelope"></i>
    <input class="input" type="email" name="email" value="{{ profile.email }}" required>
    <span>Gmail</span>
  </label>



  <button id="saveBtn" class="submit" type="submit">
    Save Changes
  </button>

  <a href="{{ url_for('dashboard') }}" class="back">← Back to Dashboard</a>

</form>

</div>
<!-- CROP MODAL -->
<div id="cropModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:999; justify-content:center; align-items:center;">
    <div style="
      background:#fff;
      padding:20px;
      border-radius:10px;
      width:90%;
      max-width:400px;
      max-height:90vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    ">

    <div class="crop-preview">
      <img id="cropImage">
    </div>

    <div class="crop-actions">
      <button onclick="closeCrop()" class="btn-cancel">Cancel</button>
      <button onclick="cropImage()" class="btn-save">Crop & Save</button>
    </div>

  </div>
</div>

<script>
let cropper;
let croppedBlob = null; // ✅ store image temporarily
const fileInput = document.getElementById("fileInput");
const cropModal = document.getElementById("cropModal");
const cropImageEl = document.getElementById("cropImage");

fileInput.addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    cropImageEl.src = event.target.result;
    cropModal.style.display = "flex";

    if (cropper) cropper.destroy();

    cropper = new Cropper(cropImageEl, {
      aspectRatio: 1,
      viewMode: 1,
      autoCropArea: 0.8,
      center: true,
      background: false,
      guides: false,
      highlight: false
    });
  };
  reader.readAsDataURL(file);
});

function closeCrop() {
  cropModal.style.display = "none";
}

function cropImage() {
  const canvas = cropper.getCroppedCanvas({
    width: 300,
    height: 300
  });

  canvas.toBlob(function(blob) {
    croppedBlob = blob; // ✅ STORE ONLY (no upload yet)

    // 🔥 preview only
    const preview = document.getElementById("profilePreview");
    preview.src = URL.createObjectURL(blob);
  });

  closeCrop();
}

  document.querySelector(".form").addEventListener("submit", function(e) {
    e.preventDefault();

    const form = this;
    const formData = new FormData(form);
    const btn = document.getElementById("saveBtn");

    // 🔥 LOADING STATE
    btn.innerText = "Saving...";
    btn.disabled = true;
    btn.style.opacity = "0.7";
    btn.style.cursor = "not-allowed";

    if (croppedBlob) {
      formData.append("profile_pic", croppedBlob, "profile.png");
    }

    fetch("/profile", {
      method: "POST",
      body: formData
    })
    .then(res => {
      if (res.ok) {
        location.reload();
      } else {
        // ❌ error fallback
        btn.innerText = "Save Changes";
        btn.disabled = false;
        btn.style.opacity = "1";
        btn.style.cursor = "pointer";
      }
    })
    .catch(() => {
      // ❌ network error fallback
      btn.innerText = "Save Changes";
      btn.disabled = false;
      btn.style.opacity = "1";
      btn.style.cursor = "pointer";
    });
  });
</script>

</body>
</html>
