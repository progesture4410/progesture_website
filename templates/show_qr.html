<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your QR Code - ProGesture</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #e9e9e9;
}

/* ===== BACKGROUND ===== */
.cyber-pattern{
  position:fixed;
  inset:0;
  z-index:-1;
  background-color:#e9e9e9;
  background-image:
    radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.12) 100%),
    linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px);
  background-size:100% 100%,60px 60px,60px 60px;
}

/* ===== TOP BAR ===== */
.topbar{
  position:fixed;
  inset:0 0 auto 0;
  height:56px;
  display:flex;
  align-items:center;
  padding:0 20px;
  z-index:1200;
}

.btn-back{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 14px;
  font-size:12px;
  font-weight:600;
  border-radius:10px;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(135deg, #800000, #a00000);
}

/* ===== HEADER OUTSIDE BOX ===== */
.top-header {
  position: absolute;
  top: -120px;
  width: 100%;
  text-align: center;
}

.brand-header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.brand-logo{
  width:60px;
}

.brand-text{
  font-size:34px;
  font-weight:700;
  color:#800000;
}

.top-message{
  font-size:14px;
  color:#4b5563;
  margin-top:6px;
}

/* ===== CONTAINER ===== */
.form-container {
  position: relative;
  width: 100%;
  max-width: 420px;
}

/* ===== CARD ===== */
.form {
  background:#ffffff;
  border-radius:24px;
  padding:25px 30px;

  border:1px solid rgba(128,0,0,0.12);
  box-shadow:
    0 30px 60px rgba(0,0,0,0.12),
    0 10px 25px rgba(0,0,0,0.08);

  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:12px;
}

/* ===== HEADER INSIDE BOX ===== */
.form-title{
  font-size:18px;
  font-weight:700;
  color:#800000;
  align-self:flex-start;
}

/* ===== QR ===== */
.qr-img{
  width:220px;
  margin:10px 0;
}

/* ===== TEXT ===== */
.success{
  font-weight:700;
  color:#800000;
}

.message{
  font-size:14px;
  color:#4b5563;
}

/* ===== BUTTONS ===== */
.submit{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#800000,#a00000);
  color:white;
  font-weight:600;
  cursor:pointer;
}

.submit:hover{
  transform:translateY(-1px);
}

.back-login{
  text-align:center;
  font-size:13px;
  font-weight:600;
  color:#800000;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="topbar">
  <a href="/" class="btn-back">
    <i class="fa-solid fa-arrow-left"></i>
    Back to Home
  </a>
</div>

<div class="cyber-pattern"></div>

<div class="form-container">

  <!-- OUTSIDE HEADER -->
  <div class="top-header">
    <div class="brand-header">
      <img src="/static/images/pup_logo.png" class="brand-logo">
      <span class="brand-text">PROGESTURE</span>
    </div>

    <p class="top-message">
      Download your QR Code for faster login.
    </p>
  </div>

  <!-- CARD -->
  <div class="form">

    <p class="form-title">Save your QR code</p>

    <img src="{{ qr_url }}" class="qr-img">

    <div class="success">Signup Successful 🎉</div>
    <div class="message">Welcome, <b>{{ username }}</b></div>

    <a href="{{ qr_url }}" download class="submit">
      Download QR Code
    </a>

    <!-- SAME STYLE AS FORGOT PASSWORD SECOND BUTTON -->
    <a href="{{ url_for('login') }}" class="back-login">
      ← Back to Login
    </a>

  </div>

</div>

</body>
</html>
