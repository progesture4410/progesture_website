<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your QR Code - ProGesture</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #e9e9e9;
            padding-top: 80px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        img {
            width: 250px;
            margin: 20px 0;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #800000;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 15px;
        }

        .btn:hover {
            background: #a00000;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Signup Successful 🎉</h2>
    <p>Welcome, <b>{{ username }}</b></p>

    <p>Scan or save your QR code:</p>

    <img src="{{ qr_url }}" alt="QR Code">

    <br>

    <a href="{{ qr_url }}" download class="btn">Download QR</a>
    <br>
    <a href="{{ url_for('login') }}" class="btn">Go to Login</a>
</div>

</body>
</html>
